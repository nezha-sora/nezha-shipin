<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哪吒 - 视频封面</title>
    <style>
        /* 延续极简 Apple-style UI */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧滚动控制区 */
        .sidebar {
            width: 420px;
            background: var(--card-bg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
            overflow-y: auto;
            border-right: 1px solid #d2d2d7;
            z-index: 10;
        }

        .section {
            background: #ffffff;
            padding: 16px;
            border-radius: var(--border-radius);
            border: 1px solid #e5e5e7;
        }

        h2 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 输入与滑块样式 */
        .control-item { margin-bottom: 12px; }
        .control-item label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .slider-group { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        .val-display { font-size: 12px; color: var(--text-muted); width: 40px; text-align: right; }

        /* 按钮 */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.secondary { background: #e8e8ed; color: var(--text-main); margin-top: 8px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn-group button { flex: 1; margin-top: 0; font-size: 13px; padding: 8px;}

        /* 右侧预览区 */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e5e5e7;
            padding: 20px;
        }

        .canvas-container {
            height: 95%;
            aspect-ratio: 9 / 16;
            background: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border-radius: 4px;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        video { width: 100%; border-radius: 8px; background: #000; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="font-size: 20px; margin-bottom: 4px;">视频截取</h1>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">视频截取</p>

        <div class="section">
            <h2>1. 视频进度微调</h2>
            <div class="control-item">
                <label>选择视频</label>
                <input type="file" id="videoUpload" accept="video/*">
                <video id="sourceVideo" controls></video>
                <div class="btn-group">
                    <button id="stepBack" class="secondary">⏪ -0.05秒</button>
                    <button id="stepForward" class="secondary">+0.05秒 ⏩</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>2. 画面截取</h2>
            <button id="captureBtn">截取当前视频帧</button>
            <button id="downloadFrameBtn" class="secondary">⬇️ 下载截取原图</button>
            
            <div class="control-item" style="margin-top:16px;">
                <label>海报画面缩放 (针对截取帧)</label>
                <div class="slider-group">
                    <input type="range" id="vScale" min="0.5" max="3" step="0.01" value="1">
                    <span class="val-display" id="vScaleVal">1.0</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>3. 文字模版设置</h2>
            <div class="control-item">
                <label>模版内容</label>
                <input type="text" id="textContent" value="在这里输入标题">
            </div>
            <div class="control-item">
                <label>字体选择</label>
                <select id="fontFamily">
                    <option value="system-ui">系统默认 (Sans-serif)</option>
                    <option value="Georgia">衬线体 (Georgia)</option>
                    <option value="Courier New">等宽体 (Courier)</option>
                    <option value="'Microsoft YaHei'">微软雅黑</option>
                </select>
            </div>
            <div class="control-item">
                <label>字体大小</label>
                <div class="slider-group">
                    <input type="range" id="fontSize" min="20" max="200" value="80">
                    <span class="val-display" id="fontSizeVal">80</span>
                </div>
            </div>
            <div class="control-item">
                <label>垂直位置 (Y)</label>
                <div class="slider-group">
                    <input type="range" id="textY" min="0" max="1600" value="1450">
                </div>
            </div>
            <div class="control-item">
                <label>水平偏移 (X)</label>
                <div class="slider-group">
                    <input type="range" id="textX" min="-450" max="450" value="0">
                </div>
            </div>
            <button class="secondary" id="resetText">重置文字居中</button>
        </div>

        <button id="exportBtn" style="background: #1d1d1f; margin-top: 10px;">💾 保存高清海报</button>
    </div>

    <div class="workspace">
        <div class="canvas-container">
            <canvas id="mainCanvas" width="900" height="1600"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const sourceVideo = document.getElementById('sourceVideo');
        
        // 状态变量
        let capturedFrame = null;

        // 初始化预览
        function init() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,900,1600);
            render();
        }

        // 核心渲染引擎
        function render() {
            ctx.clearRect(0, 0, 900, 1600);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 900, 1600);

            // 1. 绘制视频帧
            if (capturedFrame) {
                const scale = parseFloat(document.getElementById('vScale').value);
                const w = capturedFrame.width;
                const h = capturedFrame.height;
                
                // 居中计算
                const ratio = Math.max(900/w, 1600/h) * scale;
                const drawW = w * ratio;
                const drawH = h * ratio;
                const x = (900 - drawW) / 2;
                const y = (1600 - drawH) / 2;
                
                ctx.drawImage(capturedFrame, x, y, drawW, drawH);
            }

            // 2. 绘制文字 (居中与自定义控制逻辑)
            const text = document.getElementById('textContent').value;
            const size = document.getElementById('fontSize').value;
            const family = document.getElementById('fontFamily').value;
            const xOffset = parseInt(document.getElementById('textX').value);
            const yPos = parseInt(document.getElementById('textY').value);

            ctx.save();
            ctx.font = `bold ${size}px ${family}`;
            ctx.fillStyle = "white";
            ctx.textAlign = "center"; 
            
            // 为了在白色背景下也能看清文字，增加一点文字阴影
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowBlur = 12;
            
            // 绘制位置 = 画布中心(450) + 用户偏移X, 用户指定Y
            ctx.fillText(text, 450 + xOffset, yPos);
            ctx.restore();
        }

        // --- 事件监听区 ---

        // 视频上传
        document.getElementById('videoUpload').addEventListener('change', e => {
            const file = e.target.files[0];
            if(file) {
                sourceVideo.src = URL.createObjectURL(file);
            }
        });

        // 视频微调控制
        document.getElementById('stepBack').addEventListener('click', () => {
            if(sourceVideo.readyState > 0) {
                sourceVideo.currentTime = Math.max(0, sourceVideo.currentTime - 0.05);
            }
        });

        document.getElementById('stepForward').addEventListener('click', () => {
            if(sourceVideo.readyState > 0) {
                sourceVideo.currentTime = Math.min(sourceVideo.duration, sourceVideo.currentTime + 0.05);
            }
        });

        // 截取视频帧
        document.getElementById('captureBtn').addEventListener('click', () => {
            if (!sourceVideo.src) {
                alert("请先上传视频！");
                return;
            }
            const offScreen = document.createElement('canvas');
            offScreen.width = sourceVideo.videoWidth;
            offScreen.height = sourceVideo.videoHeight;
            offScreen.getContext('2d').drawImage(sourceVideo, 0, 0);
            
            const img = new Image();
            img.src = offScreen.toDataURL('image/png'); // 使用 PNG 保证原图质量
            img.onload = () => { 
                capturedFrame = img; 
                render(); 
            };
        });

        // 仅下载截取的原图
        document.getElementById('downloadFrameBtn').addEventListener('click', () => {
            if (!capturedFrame) {
                alert("请先点击上方按钮截取视频帧！");
                return;
            }
            const link = document.createElement('a');
            link.download = `哪吒画布_原帧快照_${new Date().getTime()}.png`;
            link.href = capturedFrame.src; // 直接下载缓存中的原比例截图
            link.click();
        });

        // 交互滑块联动
        const inputs = ['vScale', 'textContent', 'fontFamily', 'fontSize', 'textY', 'textX'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if(document.getElementById(id+'Val')) {
                    document.getElementById(id+'Val').innerText = document.getElementById(id).value;
                }
                render();
            });
        });

        // 重置文字
        document.getElementById('resetText').addEventListener('click', () => {
            document.getElementById('textX').value = 0;
            document.getElementById('textY').value = 1450; 
            render();
        });

        // 导出最终海报
        document.getElementById('exportBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `哪吒画布_合成海报_${new Date().getTime()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        });

        // 初始化
        init();
    </script>
</body>
</html>
